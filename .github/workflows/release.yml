name: Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

permissions:
  contents: read

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: corepack enable

      - name: Cache Yarn cache
        uses: actions/cache@v4
        with:
          path: frontend/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install deps (first lock then immutable)
        working-directory: frontend
        run: |
          if [ ! -f yarn.lock ]; then
            echo "::notice::No yarn.lock detected – generating once."
            YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install --mode=update-lockfile
          fi
          yarn install --immutable

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Cyber Front Page
            org.opencontainers.image.description=Static SPA served by Caddy

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build & push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_LOCAL_DIST=1

      - name: Generate SBOM (optional)
        if: ${{ vars.ENABLE_SBOM == 'true' }}
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.tags }}
          artifact-name: sbom.spdx.json
          format: spdx-json
