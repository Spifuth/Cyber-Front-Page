name: Dependency Audit

on:
  push:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure package-lock.json exists (for npm audit)
        working-directory: frontend
        run: |
          npm i --package-lock-only --no-audit --no-fund

      # Do NOT mask audit exit codes; --audit-level=high already ignores low/moderate.
      - name: Audit JS dependencies (fail on high/critical only)
        working-directory: frontend
        run: |
          set -e
          npm audit --audit-level=high

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt
