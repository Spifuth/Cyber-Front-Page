name: CI

on:
  pull_request: { branches: [ "dev", "main" ] }
  push: { branches: [ "dev" ] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable

      - name: Cache Yarn cache
        uses: actions/cache@v4
        with:
          path: frontend/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install deps (first lock then immutable)
        working-directory: frontend
        run: |
          if [ ! -f yarn.lock ]; then
            echo "::notice::No yarn.lock detected – generating once."
            YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install --mode=update-lockfile
          fi
          yarn install --immutable

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      # npm audit requires package-lock.json; we don't commit it, so generate it on-the-fly here.
      - name: Ensure package-lock.json exists (for npm audit)
        working-directory: frontend
        run: |
          # Generate a lockfile only for audit if missing; do not modify node_modules
          npm i --package-lock-only --no-audit --no-fund

      - name: Audit JS dependencies (fail on high/critical only)
        working-directory: frontend
        run: npm audit --audit-level=high || echo "Non-high issues detected (ignored)"

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - run: pip install -r backend/requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt

  docker-image:
    needs: [ frontend ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=pr
            type=ref,event=branch
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Cyber Front Page
            org.opencontainers.image.description=Static SPA served by Caddy

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=docker
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_LOCAL_DIST=1

      - name: Run container & smoke test
        run: |
          set -euo pipefail
          docker image ls
          IMAGE_ID=$(docker images --format "{{.ID}}" | head -n1)
          docker run -d --rm -p 8080:80 --name cyberfront "$IMAGE_ID"
          echo "Waiting for container health..."
          success=0
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health >/dev/null; then
              echo "Health check passed."
              success=1
              break
            fi
            sleep 1
          done
          if [ "$success" -ne 1 ]; then
            echo "::error::Service did not become healthy in time."
            docker logs cyberfront || true
            docker stop cyberfront >/dev/null 2>&1 || true
            exit 1
          fi
          docker stop cyberfront
