name: CI
on:
  push: { branches: [ "dev" ] }
  pull_request: { branches: [ "dev" ] }

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: corepack enable

      - name: Install deps (first lock then immutable)
        working-directory: frontend
        run: |
          if [ ! -f yarn.lock ]; then
            echo "::notice::No yarn.lock detected – generating once."
            YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install --mode=update-lockfile
          fi
          yarn install --immutable

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Audit JS dependencies (fail on high/critical only)
        working-directory: frontend
        run: npm audit --audit-level=high || echo "Non-high issues detected (ignored)"

      - uses: actions/upload-artifact@v4
        with: { name: frontend-dist, path: frontend/dist }

  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r backend/requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt

  docker-image:
    needs: [ frontend ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: frontend-dist, path: frontend/dist }
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=docker
          build-args: |
            USE_LOCAL_DIST=1
      - name: Run container & smoke test
        run: |
          docker image ls
          IMAGE_ID=$(docker images --format "{{.ID}}" | head -n1)
          docker run -d --rm -p 8080:80 --name cyberfront "$IMAGE_ID"
          sleep 2
          curl -fsS http://localhost:8080/health
          docker stop cyberfront
      - name: (optional) Build & push to GHCR
        if: ${{ secrets.GHCR_PUSH == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            USE_LOCAL_DIST=1
