# Snippet to add to your main docker-compose-Debian-homelab-Hetzner.yml
# Add this under the 'services:' section

  # ========================
  # CYBER-FRONT-PAGE
  # ========================
  cyberfront:
    container_name: cyberfront
    image: ghcr.io/spifuth/cyber-front-page:latest
    restart: unless-stopped
    networks:
      - t3_proxy
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
    volumes:
      - $DOCKERDIR/appdata/cyberfront/data:/app/frontend/public/data:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # Router - Public access (no auth)
      - "traefik.http.routers.cyberfront-rtr.entrypoints=websecure-external"
      - "traefik.http.routers.cyberfront-rtr.rule=Host(`$DOMAINNAME`) || Host(`www.$DOMAINNAME`)"
      - "traefik.http.routers.cyberfront-rtr.tls=true"
      - "traefik.http.routers.cyberfront-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.cyberfront-rtr.service=cyberfront-svc"
      # Service
      - "traefik.http.services.cyberfront-svc.loadbalancer.server.port=80"
      # Homepage (Deployrr Dashboard)
      - "homepage.group=Apps"
      - "homepage.name=Cyber Front Page"
      - "homepage.icon=mdi-web"
      - "homepage.href=https://$DOMAINNAME"
      - "homepage.description=Portfolio & Terminal"
