# docker-compose.yml – Reviewed & updated for production readiness
# Volume names, explicit network, env_file usage, restart policy, Traefik labels.
version: "3.9"

services:
  cyberfront:
    image: ${IMAGE_NAME:-cyber-front-page:dev}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
        - USE_LOCAL_DIST=${USE_LOCAL_DIST:-0}
    env_file:
      - ../.env # centralize runtime configuration without inline secrets
    # Healthcheck provided by the Dockerfile (Caddy runtime stage) is used implicitly
    labels:
      - "traefik.enable=true" # ensure Traefik discovers the service
      - "traefik.http.routers.cyberfront.rule=Host(`${SITE_DOMAIN:-example.com}`)" # route based on the configured domain
      - "traefik.http.routers.cyberfront.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.cyberfront.loadbalancer.server.port=80"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self';"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=63072000; includeSubDomains; preload"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.routers.cyberfront.middlewares=cyberfront-headers"
    restart: unless-stopped # keep the service resilient across restarts
    volumes:
      - cyberfront_data:/data # persist Caddy TLS assets and other runtime data
    networks:
      - traefik-net # join the shared Traefik network for routing

volumes:
  cyberfront_data: {} # named volume for persistent service data

networks:
  traefik-net:
    external: true
    name: traefik-net # reuse the externally managed Traefik network
