# =============================================
# DOCKER COMPOSE FOR PRODUCTION DEPLOYMENT
# Cyberpunk Portfolio - Traefik Ready (No NGINX)
# =============================================

version: '3.8'

services:
  cyberpunk-portfolio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - NODE_ENV=production
    
    container_name: cyberpunk-portfolio
    
    # Security: Run as non-root
    user: "1001:1001"
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Read-only root filesystem (except writable volumes)
    read_only: true
    
    # Temporary filesystem for node/serve runtime
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    
    # Restart policy
    restart: unless-stopped
    
    # Health check (fixed to use curl with correct port)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Labels for Traefik (updated for port 3000)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cyberpunk.rule=Host(`nebulahost.tech`)"
      - "traefik.http.routers.cyberpunk.entrypoints=websecure"
      - "traefik.http.routers.cyberpunk.tls.certresolver=letsencrypt"
      - "traefik.http.services.cyberpunk.loadbalancer.server.port=3000"
      
      # Security headers (handled by Traefik middleware)
      - "traefik.http.middlewares.cyberpunk-security.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.cyberpunk-security.headers.framedeny=true"
      - "traefik.http.middlewares.cyberpunk-security.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.cyberpunk-security.headers.browserxssfilter=true"
      - "traefik.http.middlewares.cyberpunk-security.headers.referrerpolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.cyberpunk-security.headers.customresponseheaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';"
      - "traefik.http.routers.cyberpunk.middlewares=cyberpunk-security"
    
    # Environment variables (minimal for security)
    environment:
      - NODE_ENV=production
      - PORT=3000
    
    # Networks
    networks:
      - traefik
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# External network (should be created by Traefik)
networks:
  traefik:
    external: true