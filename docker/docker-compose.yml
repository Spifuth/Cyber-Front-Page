# docker-compose.yml – Deployrr compatible configuration
# Deploy as homepage for nebulahost.tech
services:
  # CyberFront - Cyber Portfolio Homepage
  cyberfront:
    image: ${IMAGE_NAME:-ghcr.io/your-username/cyber-front-page:latest}
    container_name: cyberfront
    build:
      context: ..
      dockerfile: Dockerfile
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - default
    ports:
      - "$CYBERFRONT_PORT:80"
    # DOCKER-LABELS-PLACEHOLDER
