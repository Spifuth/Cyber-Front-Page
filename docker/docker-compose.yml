# docker-compose.yml – Deployrr compatible configuration
# Deploy as homepage for nebulahost.tech
#
# Option 1: Use this file standalone with Traefik rules file
# Option 2: Copy content to your Deployrr custom.yml
#
# Required in .env: CYBERFRONT_PORT=8090

services:
  # CyberFront - Cyber Portfolio Homepage
  cyberfront:
    image: ${IMAGE_NAME:-ghcr.io/your-username/cyber-front-page:latest}
    container_name: cyberfront
    build:
      context: ..
      dockerfile: Dockerfile
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - default
    ports:
      - "$CYBERFRONT_PORT:80"
    environment:
      - TZ=$TZ
    # DOCKER-LABELS-PLACEHOLDER
