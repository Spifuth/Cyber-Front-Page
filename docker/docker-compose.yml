version: "3.9"

services:
  cyberfront:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      SITE_NAME: ${SITE_NAME:-Cyber Front Page}
      SITE_THEME: ${SITE_THEME:-cyber}
      SITE_DOMAIN: ${SITE_DOMAIN:-example.com}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:5173}
    # Expose port 8080 locally; remove when Traefik handles routing exclusively
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cyberfront.rule=${TRAEFIK_ROUTER_RULE:-Host(`example.com`)}"
      - "traefik.http.routers.cyberfront.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.cyberfront.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
    name: traefik-net
