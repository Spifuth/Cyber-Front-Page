# docker-compose.yml – Compatible with Deployrr stack management
# Configured for nebulahost.tech domain behind Cloudflare + Traefik
version: "3.9"

services:
  cyberfront:
    image: ${IMAGE_NAME:-cyber-front-page:latest}
    container_name: cyberfront
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
        - USE_LOCAL_DIST=${USE_LOCAL_DIST:-0}
    env_file:
      - ../.env
    expose:
      - "80"
    labels:
      # Traefik discovery
      - "traefik.enable=true"
      # HTTP Router (redirect to HTTPS)
      - "traefik.http.routers.cyberfront.rule=Host(`${SITE_DOMAIN:-nebulahost.tech}`)"
      - "traefik.http.routers.cyberfront.entrypoints=http"
      - "traefik.http.routers.cyberfront.middlewares=https-redirect@file"
      # HTTPS Router
      - "traefik.http.routers.cyberfront-secure.rule=Host(`${SITE_DOMAIN:-nebulahost.tech}`)"
      - "traefik.http.routers.cyberfront-secure.entrypoints=https"
      - "traefik.http.routers.cyberfront-secure.tls=true"
      - "traefik.http.routers.cyberfront-secure.tls.certresolver=${CERT_RESOLVER:-cloudflare}"
      # Service
      - "traefik.http.services.cyberfront.loadbalancer.server.port=80"
      # Security headers middleware
      - "traefik.http.routers.cyberfront-secure.middlewares=cyberfront-headers,crowdsec@file"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'"
      - "traefik.http.middlewares.cyberfront-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=63072000; includeSubDomains; preload"
      # Docker network
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
    restart: unless-stopped
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    external: true
