## CyberFront - Alternative configuration with www redirect
## Use this if you want both nebulahost.tech AND www.nebulahost.tech

http:
  routers:
    # Main router for root domain
    cyberfront-rtr:
      rule: "Host(`{{env "DOMAINNAME_1"}}`) || Host(`www.{{env "DOMAINNAME_1"}}`)"
      entryPoints:
        - websecure-external
      middlewares:
        - cyberfront-www-redirect
        - chain-no-auth
        - cyberfront-headers
      service: cyberfront-svc
      tls:
        certResolver: dns-cloudflare
        options: tls-opts@file

  services:
    cyberfront-svc:
      loadBalancer:
        servers:
          - url: "http://cyberfront:80"

  middlewares:
    # Redirect www to non-www (SEO best practice)
    cyberfront-www-redirect:
      redirectRegex:
        regex: "^https://www\\.(.*)"
        replacement: "https://${1}"
        permanent: true

    cyberfront-headers:
      headers:
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
