## CyberFront - Cyber Portfolio Homepage
## Traefik dynamic configuration for nebulahost.tech

http:
  routers:
    cyberfront-rtr:
      rule: "Host(`{{env "DOMAINNAME_1"}}`)"  # Root domain - nebulahost.tech
      entryPoints:
        - websecure-external
      middlewares:
        - chain-no-auth
        - cyberfront-headers
      service: cyberfront-svc
      tls:
        certResolver: dns-cloudflare
        options: tls-opts@file

  services:
    cyberfront-svc:
      loadBalancer:
        servers:
          - url: "http://cyberfront:80"

  middlewares:
    cyberfront-headers:
      headers:
        # Security headers specific to CyberFront
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
